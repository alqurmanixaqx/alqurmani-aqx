<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شذرات الفكر وعبق الفواصل | القرماني إكس AQX</title>
    <meta name="description" content="منصة القرماني إكس AQX - شذرات الفكر وعبق الفواصل، واحة الخواطر الشاعرية، المتفرقات الأدبية، واللمحات الفكرية المنثورة في قالب مخملي دافئ.">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=700;900&family=Tajawal:wght=500;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* ألوان الماهوجني والعنابي المخملي المتوافق مع سحر الخواطر والشذرات */
            --theme-deep: #0f0306;
            --theme-mid: #24070e;
            --theme-light: #3d111b;
            
            /* درجات ذهب الشامبانيا الناعم والبلاتين الحريري (Champagne & Silk) */
            --amber-1: #f0e2d3;
            --amber-2: #e2c29d;
            --amber-3: #c4905d;
            --amber-4: #875129;
            --amber-5: #f7f4eb;
            --amber-6: #4a141d;
            --amber-7: #fcd34d;
            
            /* خلفية زجاجية معتمة بلمسة عنابية دافئة */
            --glass-bg: rgba(15, 3, 6, 0.8);
            --glass-border: rgba(226, 194, 157, 0.25);
        }

        /* شريط شامبانيا متحرك حول الحواف كإطار مذكرات كلاسيكية فاخرة */
        html::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 6px solid transparent;
            border-image: linear-gradient(45deg, var(--amber-1), var(--amber-3), var(--amber-5), var(--amber-6), var(--amber-2), var(--amber-4), var(--amber-7)) 1;
            z-index: 9999;
            pointer-events: none;
            animation: vintageBorder 6s infinite alternate linear;
        }

        @keyframes vintageBorder {
            0% { filter: hue-rotate(0deg) brightness(0.95); }
            50% { filter: hue-rotate(20deg) brightness(1.25); }
            100% { filter: hue-rotate(-20deg) brightness(0.95); }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        /* خلفية عنابية مخملية دافئة */
        body {
            background: radial-gradient(circle at top left, var(--theme-light) 0%, var(--theme-mid) 45%, var(--theme-deep) 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* جزيئات الإلهام الأدبي (شرارات الشامبانيا الدافئة) */
        #shadharat-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1250px;
            margin: 0 auto;
            padding: 0 20px 60px 20px;
        }

        /* مساحة فارغة علوية */
        .top-spacer {
            height: 150px;
            width: 100%;
        }

        /* عنوان نيون إبداعي بألوان ذهب الشامبانيا الدافئ */
        .neon-section-title {
            font-family: 'Cairo', sans-serif;
            font-size: clamp(2.6rem, 5vw, 4.3rem);
            font-weight: 900;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 25px;
            animation: floatTitle 3.5s ease-in-out infinite alternate, amberNeonPulse 9s infinite linear;
        }

        @keyframes floatTitle {
            0% { transform: translateY(0); }
            100% { transform: translateY(-12px); }
        }

        @keyframes amberNeonPulse {
            0%, 100% { color: #ffffff; text-shadow: 0 0 15px var(--amber-2), 0 0 30px var(--amber-3); }
            50% { color: var(--amber-1); text-shadow: 0 0 15px var(--amber-7), 0 0 35px var(--amber-4); }
        }

        /* حاوية الإعلان العلوي */
        .ad-banner-top {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
            min-height: 50px;
        }

        /* مربع البحث الفني المخملي */
        .search-wrapper {
            max-width: 650px;
            margin: 0 auto 30px auto;
            position: relative;
        }

        .smart-search-input {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.15rem;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid var(--glass-border);
            border-radius: 50px;
            color: #ffffff;
            outline: none;
            backdrop-filter: blur(12px);
            transition: all 0.4s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            text-align: center;
        }

        .smart-search-input::placeholder {
            color: rgba(255, 255, 255, 0.55);
        }

        .smart-search-input:focus {
            border-color: var(--amber-2);
            box-shadow: 0 0 25px rgba(226, 194, 157, 0.4);
            background: rgba(0, 0, 0, 0.8);
        }

        .search-predictions {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: rgba(15, 3, 6, 0.98);
            border: 1px solid var(--amber-3);
            border-top: none;
            border-radius: 0 0 20px 20px;
            z-index: 500;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
        }

        .prediction-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 800;
            transition: all 0.2s;
            text-align: right;
            color: #fff;
        }
        .prediction-item:hover {
            background: var(--amber-3);
            color: #000;
        }

        /* الوصف الأدبي الساحر للقسم */
        .section-editorial-desc {
            max-width: 800px;
            margin: 0 auto 50px auto;
            text-align: center;
            font-size: 1.25rem;
            line-height: 1.8;
            color: #f0e2d3;
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
            font-weight: 500;
        }
        .section-editorial-desc strong {
            color: var(--amber-2);
            font-weight: 900;
            text-shadow: 0 0 10px rgba(226, 194, 157, 0.3);
        }

        /* شبكة المقالات الفنية والإعلانات المدمجة */
        .articles-lux-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 35px;
            margin-bottom: 40px;
        }

        /* كارت المتفرقات الأدبية المخملي */
        .poetry-lux-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }

        .poetry-lux-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--amber-2);
            box-shadow: 0 25px 50px rgba(226, 194, 157, 0.25);
        }

        .card-thumb-space {
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: #080103;
            position: relative;
        }

        /* إضافة طبقة لونية خفيفة على الصورة لدمجها مع التصميم العنابي */
        .card-thumb-space::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent, rgba(15, 3, 6, 0.95));
            pointer-events: none;
        }

        .card-thumb-space img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .poetry-lux-card:hover .card-thumb-space img {
            transform: scale(1.1) rotate(-1.5deg);
        }

        .card-info-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: space-between;
            gap: 20px;
            position: relative;
            z-index: 2;
        }

        .card-post-title {
            font-size: 1.35rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.6;
            text-align: right;
            transition: color 0.3s;
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
        }

        .poetry-lux-card:hover .card-post-title {
            color: var(--amber-1);
        }

        .read-now-lux-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(226, 194, 157, 0.4);
            border-radius: 12px;
            color: var(--amber-2);
            font-weight: 900;
            font-size: 1.05rem;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .read-now-lux-btn:hover {
            background: linear-gradient(135deg, var(--amber-2), var(--amber-4));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 8px 25px rgba(226, 194, 157, 0.4);
        }

        /* حاوية الإعلان المدمج هندسياً بعد المقال الثالث لمنع توقف الأكواد */
        .inline-ad-card {
            grid-column: span 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            border: 2px dashed rgba(226, 194, 157, 0.25);
            border-radius: 20px;
            min-height: 300px;
            order: 4; 
        }

        .dynamic-post-item {
            order: 5; 
        }

        /* حاوية الميديا ديلي موشن المفلترة */
        .dailymotion-media-row {
            max-width: 900px;
            width: 100%;
            margin: 50px auto;
            border: 3px solid var(--glass-border);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            background: #000;
        }

        .video-wrapper-ratio {
            position: relative;
            padding-top: 56.25%;
            width: 100%;
        }

        .video-wrapper-ratio iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        /* زر عرض المزيد الحالم */
        .load-more-center-box {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .infinity-load-btn {
            padding: 16px 55px;
            font-size: 1.2rem;
            font-weight: 900;
            color: #ffffff;
            background: linear-gradient(135deg, var(--theme-mid), var(--theme-deep));
            border: 2px solid var(--amber-2);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
        }

        .infinity-load-btn:hover {
            background: linear-gradient(135deg, var(--amber-2), var(--amber-4));
            box-shadow: 0 0 35px rgba(226, 194, 157, 0.4);
            transform: scale(1.05);
            color: #fff;
        }

        /* نظام الفوتر الفاخر */
        .luxury-footer-system {
            width: 100%;
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid rgba(226, 194, 157, 0.15);
            font-weight: 800;
            font-size: 1.1rem;
            color: #ffffff;
            background: rgba(8, 1, 2, 0.96);
            position: relative;
            z-index: 100;
        }

        .luxury-footer-system span {
            color: var(--amber-2);
            text-shadow: 0 0 10px rgba(226, 194, 157, 0.3);
        }

        /* السهم الذكي الحركي المتشقلب */
        .smart-scroll-top-trigger {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--amber-2), var(--amber-4));
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 26px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(226, 194, 157, 0.5);
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .smart-scroll-top-trigger.reveal {
            opacity: 1;
            visibility: visible;
        }

        .smart-scroll-top-trigger.flip-active {
            animation: flipSpinSound 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes flipSpinSound {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-40px) rotate(180deg); }
            100% { transform: translateY(0) rotate(360deg); }
        }

        @media (max-width: 768px) {
            .top-spacer { height: 100px; }
            .smart-scroll-top-trigger { bottom: 25px; right: 25px; width: 50px; height: 50px; font-size: 22px; }
        }
    </style>
</head>

    <footer class="luxury-footer-system">
        جميع الحقوق محفوظة لمنصة <span>القرماني إكس AQX</span> © <span id="year"></span>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        /* 1. نظام محاكاة شرارات الشامبانيا والومضات الدافئة السابحة بنعومة */
        const canvas = document.getElementById('shadharat-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.size = Math.random() * 2.2 + 0.6;
                this.speedY = Math.random() * -0.6 - 0.1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.alpha = Math.random() * 0.75 + 0.15;
                // دمج مبهج ومخملي بين ذهب الشامبانيا المشرق والبيج الحريري
                this.colorType = Math.random() > 0.4 ? 'champagne' : 'silk';
            }
            update() {
                this.y += this.speedY; this.x += this.speedX;
                // حركة متمايلة ناعمة جداً كحركة رماد الورق المحترق بلطف
                this.x += Math.sin(this.y * 0.025) * 0.35;
                if (this.y < -20) this.reset();
            }
            draw() {
                if(this.colorType === 'champagne') {
                    ctx.fillStyle = `rgba(226, 194, 157, ${this.alpha})`;
                } else {
                    ctx.fillStyle = `rgba(240, 226, 211, ${this.alpha})`;
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        for (let i = 0; i < 95; i++) particles.push(new Particle());
        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        /* 2. هندسة المؤثرات الترددية الفخمة عند تفاعل الزائر بصرياً وسماعياً */
        let audioCtx;
        function initAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playClickSound() {
            initAudioContext();
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(750, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1300, audioCtx.currentTime + 0.14);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.14);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.14);
        }

        function playFlipSound() {
            initAudioContext();
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(280, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(850, audioCtx.currentTime + 0.48);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.48);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.48);
        }

        /* 3. بروتوكول جلب البيانات الآمن وحقنها وتخطي CORS عبر آلية JSONP مع بلوجر */
        let allPosts = [];
        let displayedCount = 0;
        const perPage = 6;

        window.processBloggerFeed = function(json) {
            if (json.feed && json.feed.entry) {
                allPosts = json.feed.entry.map(entry => {
                    let img = 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiwM2tZ7uGsc-lJtU5m04Q272eX1T9vKxR7a0k/s1600/default.jpg';
                    if (entry.media$thumbnail) {
                        img = entry.media$thumbnail.url.replace(/\/s\d+(-c)?\//, '/s1600/');
                    } else if (entry.content && entry.content.$t) {
                        const m = entry.content.$t.match(/src="([^"]+)"/);
                        if (m) img = m[1];
                    }
                    let link = '#';
                    const altLink = entry.link.find(l => l.rel === 'alternate');
                    if (altLink) link = altLink.href;

                    return {
                        title: entry.title.$t,
                        link: link,
                        img: img,
                        date: new Date(entry.published.$t)
                    };
                });
                
                allPosts.sort((a, b) => b.date - a.date);
                renderPosts();
            } else {
                document.getElementById('postsGrid').innerHTML += `<h3 style="color:#fff; text-align:center; grid-column:1/-1;">لا توجد مواد أدبية مدرجة في هذا القسم حالياً.</h3>`;
            }
        };

        function fetchPostsJSONP() {
            const script = document.createElement('script');
            // الرابط المباشر المهيأ لاستدعاء فيد قسم "متفرقات ادبية" وتمريره للباك بذكاء
            script.src = `https://www.alqurmanix.com/feeds/posts/default/-/${encodeURIComponent('متفرقات ادبية')}?alt=json-in-script&callback=processBloggerFeed&max-results=150`;
            document.body.appendChild(script);
        }

        function renderPosts() {
            const grid = document.getElementById('postsGrid');
            const limit = Math.min(displayedCount + perPage, allPosts.length);
            
            for (let i = displayedCount; i < limit; i++) {
                const post = allPosts[i];
                // المقالات الـ 3 الأولى تأخذ ترتيباً تسلسلياً (1, 2, 3) لتترك الترتيب الرابع (4) محجوزاً حصرياً للإعلان المربع
                let orderStyle = i < 3 ? `style="order: ${i+1};"` : `style="order: 5;"`;
                
                const card = `
                    <article class="poetry-lux-card dynamic-post-item" ${orderStyle}>
                        <div class="card-thumb-space">
                            <img src="${post.img}" alt="${post.title}" loading="lazy">
                        </div>
                        <div class="card-info-body">
                            <h3 class="card-post-title">${post.title}</h3>
                            <a href="${post.link}" class="read-now-lux-btn" target="_blank" onclick="playClickSound()">تصفح الشذرة ➔</a>
                        </div>
                    </article>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            }

            displayedCount = limit;
            document.getElementById('loadMoreBtn').style.display = (displayedCount < allPosts.length) ? 'block' : 'none';
        }

        function loadMorePosts() {
            playClickSound();
            renderPosts();
        }

        /* 4. معالج منظومة البحث الذاتي الفوري وحقن توقعات العناوين */
        function handleSearch(val) {
            const box = document.getElementById('suggestionsBox');
            if (!val.trim()) { box.style.display = 'none'; return; }
            
            const results = allPosts.filter(p => p.title.toLowerCase().includes(val.toLowerCase())).slice(0, 5);
            
            if (results.length === 0) {
                box.innerHTML = `<div class="prediction-item" style="color:rgba(255,255,255,0.5);">لا توجد مواد مطابقة للبحث...</div>`;
            } else {
                box.innerHTML = results.map(p => `<div class="prediction-item" onclick="goToLink('${p.link}')">${p.title}</div>`).join('');
            }
            box.style.display = 'block';
        }

        function goToLink(url) {
            playClickSound();
            window.open(url, '_blank');
            document.getElementById('suggestionsBox').style.display = 'none';
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-wrapper')) document.getElementById('suggestionsBox').style.display = 'none';
        });

        /* 5. هندسة وعمل زر الصعود الذكي ذو التأثير الشقلبي الحركي السلس */
        const upBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 400) upBtn.classList.add('reveal');
            else upBtn.classList.remove('reveal');
        });

        function triggerSmartScrollTop() {
            if (upBtn.classList.contains('flip-active')) return;
            playFlipSound();
            upBtn.classList.add('flip-active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => upBtn.classList.remove('flip-active'), 600);
        }

        // تشغيل بروتوكول الجلب التلقائي فور تحميل البنية الهيكلية للصفحة
        window.addEventListener('DOMContentLoaded', fetchPostsJSONP);
    </script>
</body>
</html>
