<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="أقوال الفلاسفة العظماء عبر التاريخ — حكم خالدة وأفكار تنير العقول. موقع AQX ايمو القرماني">
<meta name="theme-color" content="#0a0a1a">
<title>أقوال الفلاسفة | AQX ايمو القرماني</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:       #c9a84c;
    --gold-light: #f0d080;
    --gold-glow:  #e8c55a;
    --cream:      #fdf6e3;
    --deep:       #07071a;
    --mid:        #0e0e2e;
    --panel:      #13133a;
    --panel2:     #1a1a45;
    --neon-1:     #7b2fff;
    --neon-2:     #00cfff;
    --neon-3:     #ff4fd8;
    --neon-4:     #39ff14;
    --neon-5:     #ff8c00;
    --accent:     #6c35de;
    --text:       #e8dfc8;
    --text-dim:   #9990b8;
    --radius:     18px;
    --shadow:     0 8px 40px rgba(0,0,0,.6);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(160deg, #07071a 0%, #0d0b2e 40%, #130c38 70%, #07071a 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== STARFIELD ===== */
  #stars-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HERO SPACER ===== */
  .hero-spacer {
    height: 22vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .hero-spacer .floating-quote {
    font-family: 'Amiri', serif;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-style: italic;
    color: rgba(201,168,76,.25);
    text-align: center;
    padding: 0 2rem;
    animation: fadeFloat 6s ease-in-out infinite;
    letter-spacing: 1px;
  }

  @keyframes fadeFloat {
    0%, 100% { opacity: .15; transform: translateY(0); }
    50% { opacity: .45; transform: translateY(-8px); }
  }

  /* ===== SECTION WRAPPER ===== */
  .page-wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 1.2rem 6rem;
    position: relative;
    z-index: 2;
  }

  /* ===== NEON TITLE ===== */
  .section-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .section-label {
    font-size: .75rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: .6rem;
    display: block;
  }

  .neon-title {
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    font-size: clamp(2.2rem, 6vw, 4.5rem);
    line-height: 1.1;
    background: linear-gradient(90deg, var(--neon-1), var(--neon-2), var(--neon-3), var(--gold), var(--neon-2));
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: neonShift 4s linear infinite;
    filter: drop-shadow(0 0 24px rgba(123,47,255,.5));
    position: relative;
  }

  @keyframes neonShift {
    0%   { background-position: 0%; }
    100% { background-position: 300%; }
  }

  .neon-title::after {
    content: '';
    display: block;
    margin: .8rem auto 0;
    width: 120px;
    height: 3px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--neon-1), var(--gold), var(--neon-2));
    animation: neonShift 4s linear infinite;
    box-shadow: 0 0 16px var(--gold);
  }

  .section-desc {
    margin-top: 1.2rem;
    font-size: clamp(.9rem, 2vw, 1.1rem);
    color: var(--text-dim);
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.9;
  }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin: 2rem 0 2.5rem;
    flex-wrap: wrap;
  }

  .stat-item {
    text-align: center;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 14px;
    padding: .9rem 2rem;
    min-width: 110px;
    transition: all .3s;
  }

  .stat-item:hover {
    background: rgba(201,168,76,.08);
    border-color: var(--gold);
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(201,168,76,.2);
  }

  .stat-num {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--gold-glow);
    display: block;
    line-height: 1;
  }

  .stat-lbl {
    font-size: .72rem;
    color: var(--text-dim);
    margin-top: .3rem;
  }

  /* ===== AD BANNER ===== */
  .ad-banner {
    display: flex;
    justify-content: center;
    margin: 1.5rem 0;
    padding: .5rem;
    border-radius: var(--radius);
    background: rgba(255,255,255,.02);
    border: 1px solid rgba(255,255,255,.06);
  }

  /* ===== SEARCH BOX ===== */
  .search-wrap {
    position: relative;
    max-width: 640px;
    margin: 0 auto 3rem;
  }

  .search-glow {
    position: absolute;
    inset: -2px;
    border-radius: 60px;
    background: linear-gradient(90deg, var(--neon-1), var(--gold), var(--neon-2), var(--neon-3));
    background-size: 300%;
    animation: neonShift 3s linear infinite;
    filter: blur(6px);
    opacity: .6;
    z-index: 0;
  }

  .search-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    background: rgba(14,14,46,.95);
    border: 1.5px solid rgba(201,168,76,.3);
    border-radius: 60px;
    overflow: hidden;
    backdrop-filter: blur(20px);
  }

  .search-icon {
    padding: 0 1.2rem 0 1.5rem;
    color: var(--gold);
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  #searchInput {
    flex: 1;
    padding: 1rem .5rem 1rem 0;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    color: var(--cream);
    direction: rtl;
  }

  #searchInput::placeholder { color: var(--text-dim); }

  .search-clear {
    padding: 0 1.4rem;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 1rem;
    display: none;
    transition: color .2s;
    background: none;
    border: none;
  }

  .search-clear:hover { color: var(--gold); }
  .search-clear.visible { display: block; }

  .search-results-count {
    text-align: center;
    margin: -.5rem 0 1.5rem;
    font-size: .85rem;
    color: var(--text-dim);
    min-height: 1.3rem;
    transition: all .3s;
  }

  .search-results-count span {
    color: var(--gold);
    font-weight: 700;
  }

  /* ===== VIDEO SECTION ===== */
  .video-section {
    margin: 2rem 0 3rem;
  }

  .video-label {
    display: flex;
    align-items: center;
    gap: .8rem;
    margin-bottom: 1rem;
    font-weight: 700;
    color: var(--gold);
    font-size: 1rem;
  }

  .video-label::before {
    content: '';
    width: 4px; height: 22px;
    background: linear-gradient(var(--neon-1), var(--gold));
    border-radius: 4px;
  }

  .video-container {
    position: relative;
    padding-bottom: 56.25%;
    border-radius: 20px;
    overflow: hidden;
    border: 2px solid rgba(201,168,76,.25);
    box-shadow: 0 0 60px rgba(123,47,255,.25), 0 20px 60px rgba(0,0,0,.5);
  }

  .video-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  /* ===== GRID ===== */
  .articles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.8rem;
    margin-top: 1rem;
  }

  /* ===== CARD ===== */
  .card {
    background: linear-gradient(145deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid rgba(201,168,76,.15);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: transform .35s cubic-bezier(.23,1,.32,1), box-shadow .35s, border-color .35s;
    cursor: pointer;
    animation: cardIn .5s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, rgba(201,168,76,.07), transparent 60%);
    pointer-events: none;
  }

  .card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: rgba(201,168,76,.55);
    box-shadow: 0 20px 60px rgba(123,47,255,.3), 0 0 0 1px rgba(201,168,76,.2), inset 0 1px 0 rgba(255,255,255,.07);
  }

  /* Card thumbnail */
  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: var(--deep);
    transition: transform .4s;
  }

  .card:hover .card-thumb { transform: scale(1.04); }

  .card-thumb-wrap {
    overflow: hidden;
    position: relative;
  }

  .card-thumb-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(to top, var(--panel), transparent);
  }

  .card-no-thumb {
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, var(--deep), var(--mid));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: rgba(201,168,76,.2);
  }

  /* Card body */
  .card-body {
    padding: 1.4rem 1.5rem 1.2rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: .6rem;
  }

  .card-tag {
    font-size: .68rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: .5rem;
  }

  .card-tag::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 6px var(--gold);
  }

  .card-title {
    font-family: 'Amiri', serif;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.55;
    color: var(--cream);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: color .2s;
  }

  .card:hover .card-title { color: var(--gold-light); }

  .card-desc {
    font-size: .83rem;
    color: var(--text-dim);
    line-height: 1.75;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Card footer */
  .card-footer {
    padding: .9rem 1.5rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,.06);
    gap: .5rem;
  }

  .card-date {
    font-size: .72rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: .4rem;
  }

  .card-date svg { opacity: .6; }

  .card-actions {
    display: flex;
    gap: .5rem;
  }

  .btn-share, .btn-read {
    border: none;
    cursor: pointer;
    border-radius: 40px;
    font-family: 'Cairo', sans-serif;
    font-size: .78rem;
    font-weight: 700;
    transition: all .25s;
    display: flex;
    align-items: center;
    gap: .35rem;
    padding: .45rem .9rem;
  }

  .btn-read {
    background: linear-gradient(135deg, var(--neon-1), var(--accent));
    color: #fff;
    box-shadow: 0 4px 15px rgba(123,47,255,.4);
  }

  .btn-read:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(123,47,255,.6);
  }

  .btn-share {
    background: rgba(201,168,76,.12);
    border: 1px solid rgba(201,168,76,.35);
    color: var(--gold);
  }

  .btn-share:hover {
    background: rgba(201,168,76,.25);
    transform: translateY(-2px);
  }

  /* ===== LOAD MORE ===== */
  .load-more-wrap {
    text-align: center;
    margin: 3rem 0 2rem;
  }

  .btn-loadmore {
    display: inline-flex;
    align-items: center;
    gap: .8rem;
    padding: 1rem 3rem;
    border-radius: 60px;
    border: 2px solid transparent;
    background: linear-gradient(var(--panel2), var(--panel2)) padding-box,
                linear-gradient(90deg, var(--neon-1), var(--gold), var(--neon-2)) border-box;
    color: var(--gold);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .3s;
  }

  .btn-loadmore:hover {
    background: linear-gradient(135deg, rgba(123,47,255,.15), rgba(201,168,76,.1)) padding-box,
                linear-gradient(90deg, var(--neon-1), var(--gold), var(--neon-2)) border-box;
    transform: translateY(-3px);
    box-shadow: 0 10px 40px rgba(201,168,76,.2);
  }

  .btn-loadmore .spin {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(201,168,76,.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  .btn-loadmore.loading .spin { display: block; }
  .btn-loadmore.loading .btn-text { opacity: .6; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    display: none;
  }

  .empty-state.visible { display: block; }

  .empty-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
    opacity: .4;
  }

  .empty-title {
    font-size: 1.2rem;
    color: var(--text-dim);
    margin-bottom: .5rem;
  }

  /* ===== AD SIDEBAR/INLINE ===== */
  .ad-inline {
    display: flex;
    justify-content: center;
    padding: 1.5rem 0;
  }

  .ad-side {
    display: flex;
    justify-content: center;
    margin: 2rem 0;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: linear-gradient(135deg, var(--panel2), var(--panel));
    border: 1px solid rgba(201,168,76,.4);
    border-radius: 50px;
    padding: .75rem 2rem;
    font-size: .9rem;
    color: var(--gold);
    font-weight: 700;
    z-index: 9999;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
    transition: transform .4s cubic-bezier(.23,1,.32,1), opacity .4s;
    opacity: 0;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ===== PROGRESS BAR ===== */
  #readProgress {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--neon-1), var(--gold), var(--neon-2));
    z-index: 9999;
    transition: width .1s;
    box-shadow: 0 0 10px var(--gold);
  }

  /* ===== SKELETON LOADER ===== */
  .skeleton {
    background: linear-gradient(90deg, var(--panel) 25%, rgba(255,255,255,.04) 50%, var(--panel) 75%);
    background-size: 200%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius);
  }

  @keyframes shimmer {
    0% { background-position: 200%; }
    100% { background-position: -200%; }
  }

  .skel-card {
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.05);
  }

  .skel-img { width: 100%; aspect-ratio: 16/9; }
  .skel-line { height: 14px; margin: 12px 16px 6px; border-radius: 8px; }
  .skel-line.short { width: 60%; }
  .skel-line.long { width: 90%; }

  /* ===== BACK TO TOP (WITH FLIP ANIMATION) ===== */
  #backTop {
    position: fixed;
    bottom: 2.5rem;
    right: 1.5rem;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--neon-1), var(--accent));
    border: none;
    color: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 999;
    box-shadow: 0 4px 20px rgba(123,47,255,.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #backTop.visible { opacity: 1; pointer-events: all; }
  #backTop:hover { transform: translateY(-4px) scale(1.1); }
  
  /* حركة التشقلب عند الضغط */
  #backTop.spin-anim {
    animation: spinFlip 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes spinFlip {
    0% { transform: translateY(-4px) scale(1.1) rotate(0deg); }
    50% { transform: translateY(-20px) scale(1.2) rotate(180deg); }
    100% { transform: translateY(0) scale(1) rotate(360deg); }
  }

  /* ===== FOOTER ===== */
  .site-footer {
    text-align: center;
    padding: 3rem 1rem;
    border-top: 1px solid rgba(255,255,255,.06);
    color: var(--text-dim);
    font-size: .82rem;
    position: relative;
    z-index: 2;
  }

  .footer-logo {
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    font-size: 1.6rem;
    background: linear-gradient(90deg, var(--gold), var(--neon-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: .5rem;
    display: block;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    .articles-grid { grid-template-columns: 1fr; gap: 1.2rem; }
    .stats-bar { gap: 1rem; }
    .stat-item { min-width: 80px; padding: .7rem 1rem; }
    .neon-title { font-size: 2rem; }
  }

  /* ===== RIPPLE ===== */
  .ripple-container { position: relative; overflow: hidden; }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,.15);
    transform: scale(0);
    animation: rippleAnim .6s ease-out forwards;
    pointer-events: none;
  }

  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  /* ===== GLOW ORB BACKGROUND ===== */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    opacity: .12;
  }

  .orb1 {
    width: 600px; height: 600px;
    top: -200px; right: -200px;
    background: var(--neon-1);
    animation: orbFloat 12s ease-in-out infinite;
  }

  .orb2 {
    width: 400px; height: 400px;
    bottom: 10%; left: -150px;
    background: var(--neon-3);
    animation: orbFloat 15s ease-in-out infinite reverse;
  }

  .orb3 {
    width: 300px; height: 300px;
    top: 40%; left: 40%;
    background: var(--gold);
    animation: orbFloat 10s ease-in-out infinite 2s;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px, -40px) scale(1.08); }
  }

  /* ===== PARTICLE QUOTES ===== */
  .ambient-quote {
    position: fixed;
    font-family: 'Amiri', serif;
    font-size: .9rem;
    color: rgba(201,168,76,.07);
    pointer-events: none;
    z-index: 0;
    white-space: nowrap;
    animation: ambientDrift 18s linear infinite;
  }

  @keyframes ambientDrift {
    from { transform: translateX(110vw); opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    to { transform: translateX(-110vw); opacity: 0; }
  }
</style>
</head>
<body>

<div id="readProgress" style="width:0%"></div>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
