<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القرمانى اكس AQX | قريباً</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0d0400 0%, #3a1100 30%, #662200 60%, #0a0a0a 100%);
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        #gp {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .ad-top-container {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .ad-slot-320 {
            width: 320px;
            height: 50px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .content-card {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2.5rem 2rem;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            max-width: 800px;
            width: 95%;
        }

        h1 {
            font-size: clamp(2.2rem, 5vw, 4rem);
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #ffd700 50%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(255, 140, 0, 0.5));
        }

        .text-box {
            font-size: clamp(1.1rem, 3vw, 1.7rem);
            line-height: 1.8;
            font-weight: 600;
            color: #fff8f0;
            text-shadow: 0 2px 6px rgba(0,0,0,0.8);
            min-height: 120px;
        }

        .wp {
            display: inline-block;
            font-size: 1.8rem;
            margin-right: 6px;
            vertical-align: middle;
            transform-origin: bottom right;
            animation: wm 0.28s infinite alternate ease-in-out;
        }

        @keyframes wm {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-4px, -6px) rotate(-15deg); }
        }

        .bc {
            display: inline-block;
            width: 3px;
            height: 25px;
            background-color: #ffd700;
            margin-right: 5px;
            vertical-align: middle;
            animation: bl 0.8s infinite;
        }

        @keyframes bl {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .video-section {
            position: relative;
            z-index: 2;
            width: 95%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .ad-bottom-container {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .ad-slot-300 {
            width: 300px;
            height: 250px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

    <canvas id="gp"></canvas>

    <div class="ad-top-container">
        <div class="ad-slot-320">
            <script>
                atOptions = {
                    'key' : '6084f429253cae00d1188bae06e361f1',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/6084f429253cae00d1188bae06e361f1/invoke.js"></script>
        </div>
    </div>

    <div class="content-card">
        <h1>القرمانى اكس AQX</h1>
        <div class="text-box" id="tt"></div>
    </div>

    <div class="video-section">
        <div class="video-wrapper">
            <iframe src="https://www.dailymotion.com/embed/video/xaclp86" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
        </div>
    </div>

    <div class="ad-bottom-container">
        <div class="ad-slot-300">
            <script>
                atOptions = {
                    'key' : '82c46c1474bb89d2cb9fe0cc5b3519e3',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/82c46c1474bb89d2cb9fe0cc5b3519e3/invoke.js"></script>
        </div>
    </div>

    <script src="https://pl29700944.effectivecpmnetwork.com/f9/8c/c8/f98cc868dd2b9fe222c3ca364d94b64f.js"></script>

    <script>
        const cv = document.getElementById('gp');
        const cx = cv.getContext('2d');
        let w = cv.width = window.innerWidth;
        let h = cv.height = window.innerHeight;

        window.addEventListener('resize', () => {
            w = cv.width = window.innerWidth;
            h = cv.height = window.innerHeight;
        });

        class P {
            constructor() {
                this.rs();
            }
            rs() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.s = Math.random() * 3 + 0.8;
                this.sx = (Math.random() - 0.5) * 1.5;
                this.sy = (Math.random() - 0.5) * 1.5;
                this.o = Math.random() * 0.6 + 0.4;
                this.f = Math.random() * 0.01 + 0.005;
            }
            up() {
                this.x += this.sx;
                this.y += this.sy;
                this.o -= this.f;
                if (this.x < 0 || this.x > w || this.y < 0 || this.y > h || this.o <= 0) {
                    this.rs();
                }
            }
            dr() {
                cx.beginPath();
                cx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
                cx.fillStyle = `rgba(255, 215, 0, ${this.o})`;
                cx.shadowBlur = 15;
                cx.shadowColor = '#ffd700';
                cx.fill();
                cx.shadowBlur = 0;
            }
        }

        const pt = [];
        for (let i = 0; i < 120; i++) {
            pt.push(new P());
        }

        function an() {
            cx.clearRect(0, 0, w, h);
            pt.forEach(p => {
                p.up();
                p.dr();
            });
            requestAnimationFrame(an);
        }
        an();

        const ms = "أهلاً بك يا صانع الإبداع العظيم وفارس الحرف الفخم.. هنا حيث تلتقي الكلمة الساحرة بالرقي المطلق. ضع لمساتك الأخيرة وجهّز قصائدك وأبياتك الملحمية، فالمسرح يتهيأ، وقريباً جداً ستشرق حروفك وتتألق لتخطف العقول وتذهل العيون في سماء القرمانى اكس AQX.. انتظرنا!";
        const tg = document.getElementById('tt');
        let idx = 0;

        function ty() {
            if (idx < ms.length) {
                tg.innerHTML = ms.substring(0, idx + 1) + '<span class="wp">✍️</span>';
                idx++;
                setTimeout(ty, 60);
            } else {
                tg.innerHTML = ms + '<span class="bc">|</span>';
            }
        }

        setTimeout(ty, 1000);
    </script>
</body>
</html>
