<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQX | القرماني إكس</title>
    <style>
        /* التنسيق البصري الفاخر */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@200;400;700&display=swap');

        :root {
            --gold: #C5A059;
            --cream: #FDFBF7;
            --dark: #2D3436;
        }

        body {
            margin: 0;
            background-color: var(--cream);
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .container {
            background: white;
            padding: 80px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 600px;
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .line {
            width: 100px;
            height: 2px;
            background: var(--gold);
            margin: 0 auto 30px auto;
        }

        p {
            font-size: 1.2rem;
            color: #636e72;
            line-height: 2;
            margin-bottom: 40px;
        }

        .btn {
            padding: 15px 40px;
            background: var(--gold);
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.4s;
            display: inline-block;
        }

        .btn:hover {
            background: #a88545;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AQX</h1>
        <div class="line"></div>
        <p>نصيغ المستقبل بمعايير استثنائية.<br>القرماني إكس: حيث تلتقي الفخامة بالدقة المطلقة.</p>
        <a href="#" class="btn" onclick="alert('جارٍ التجهيز..')">ابدأ الرحلة</a>
    </div>

</body>
</html>
