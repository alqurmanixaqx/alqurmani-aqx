    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f4f7f6 0%, #e2eafc 50%, #fefae0 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            color: #2b2d42;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .ad-top-container {
            width: 100%;
            max-width: 320px;
            height: 50px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-wrapper {
            width: 100%;
            max-width: 950px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 35px;
        }

        .hero-section h1 {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1.3;
            background: linear-gradient(135deg, #1d3557 0%, #457b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .hero-section p {
            font-size: 1.3rem;
            color: #4a5568;
            font-weight: 500;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 18px 45px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #ffb703 0%, #fb8500 100%);
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(251, 133, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(251, 133, 0, 0.4);
        }

        .cta-button:active {
            transform: translateY(-2px);
        }

        .content-layout {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            align-items: start;
        }

        .video-box {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            aspect-ratio: 16/9;
            position: relative;
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .ad-side-container {
            width: 300px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        @media (max-width: 900px) {
            .content-layout {
                grid-template-columns: 1fr;
            }
            .ad-side-container {
                margin: 0 auto;
            }
            .hero-section h1 {
                font-size: 2.2rem;
            }
            .hero-section p {
                font-size: 1.1rem;
            }
            .main-wrapper {
                padding: 25px;
            }
        }
    </style>
</head>
